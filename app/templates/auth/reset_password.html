<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — SenGestion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      background: #F9FAFB;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 480px;
      background: #fff;
      border-radius: 16px;
      border: 2px solid #1A3A6B;
      box-shadow: 0 8px 40px rgba(26,58,107,0.12);
      padding: 48px 44px 40px;
    }
    .card-logo { text-align: center; margin-bottom: 28px; }
    .card-logo img { height: 80px; object-fit: contain; }
    .card-title {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 26px; font-weight: 700; color: #1A3A6B;
      text-align: center; margin: 0 0 8px;
    }
    .card-sub {
      font-size: 16px; color: #5A6A80;
      text-align: center; margin: 0 0 32px; line-height: 1.5;
    }
    .form-label {
      display: block; font-size: 16px; font-weight: 600;
      color: #1A3A6B; margin-bottom: 8px;
    }
    .input-wrap { position: relative; margin-bottom: 20px; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
    }
    .form-input {
      width: 100%; padding: 14px 14px 14px 44px;
      font-size: 16px; font-family: Arial, sans-serif;
      border: 2px solid #D0DAE8; border-radius: 10px;
      background: #F9FAFB; color: #1A3A6B; outline: none;
      transition: border-color 150ms;
    }
    .form-input:focus { border-color: #1A3A6B; background: #fff; }
    .hint { font-size: 16px; color: #8A9AB0; margin: -12px 0 20px 2px; }
    .btn-primary {
      width: 100%; padding: 15px;
      background: #1A3A6B; color: #fff;
      font-size: 17px; font-weight: 700; font-family: Arial, sans-serif;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 150ms;
    }
    .btn-primary:hover { background: #142d56; }
    .back-link { text-align: center; margin-top: 20px; font-size: 16px; color: #5A6A80; }
    .back-link a { color: #1A3A6B; font-weight: 600; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .flash { padding: 14px 16px; border-radius: 8px; font-size: 16px; margin-bottom: 20px; line-height: 1.4; }
    .flash-success { background: #D6EAE0; color: #145A32; border: 1px solid #145A32; }
    .flash-error   { background: #F5DDD6; color: #8B2500; border: 1px solid #8B2500; }
    .flash-warning { background: #FFF8E1; color: #7A5800; border: 1px solid #B8860B; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SenGestion">
  </div>
  <h1 class="card-title">Nouveau mot de passe</h1>
  <p class="card-sub">Choisissez un mot de passe sécurisé pour votre compte SenGestion.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
    <label class="form-label" for="password">Nouveau mot de passe</label>
    <div class="input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#B8860B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="password" name="password" class="form-input"
             placeholder="Minimum 6 caractères" required minlength="6">
    </div>
    <p class="hint">Minimum 6 caractères</p>

    <label class="form-label" for="confirm">Confirmer le mot de passe</label>
    <div class="input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#B8860B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4"/>
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="confirm" name="confirm" class="form-input"
             placeholder="Répétez le mot de passe" required minlength="6">
    </div>

    <button type="submit" class="btn-primary" style="margin-top: 8px;">Enregistrer le nouveau mot de passe</button>
  </form>

  <div class="back-link">
    <a href="{{ url_for('auth.login') }}">← Retour à la connexion</a>
  </div>
</div>

</body>
</html>
