{% extends "layouts/base.html" %}
{% block title %}Modifier — {{ f.nom }}{% endblock %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <a href="{{ url_for('fournisseurs.detail', fournisseur_id=f.id) }}" style="color:var(--fg-3);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px;margin-bottom:8px;">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> {{ f.nom }}
    </a>
    <h1>Modifier le fournisseur</h1>
  </div>
</div>

<div style="max-width:640px;">
  <form method="POST" action="{{ url_for('fournisseurs.modifier', fournisseur_id=f.id) }}">

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Identité</div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Nom <span style="color:var(--color-secondary);">*</span></label>
        <input type="text" name="nom" class="form-input" value="{{ f.nom }}" required>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">NINEA</label>
          <input type="text" name="ninea" class="form-input" value="{{ f.ninea or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Catégorie principale</label>
          <select name="categorie" class="form-input">
            {% for cat in ['divers','transport','repas','fournitures','communication','loyer','salaires','hebergement'] %}
            <option value="{{ cat }}" {% if f.categorie == cat %}selected{% endif %}>{{ cat|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Coordonnées</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="tel" name="telephone" class="form-input" value="{{ f.telephone or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" value="{{ f.email or '' }}">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Adresse</label>
        <input type="text" name="adresse" class="form-input" value="{{ f.adresse or '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Site web</label>
        <input type="text" name="site_web" class="form-input" value="{{ f.site_web or '' }}">
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Notes</div>
      <div class="form-group">
        <textarea name="notes" class="form-input" rows="3" style="height:auto;resize:vertical;">{{ f.notes or '' }}</textarea>
      </div>
    </div>

    <div style="display:flex;gap:12px;">
      <a href="{{ url_for('fournisseurs.detail', fournisseur_id=f.id) }}" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-primary" style="flex:1;">
        <i data-lucide="save" style="width:16px;height:16px;"></i> Enregistrer les modifications
      </button>
    </div>
  </form>
</div>
{% endblock %}
