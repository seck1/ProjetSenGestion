{% extends "layouts/base.html" %}
{% block title %}Nouveau fournisseur{% endblock %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <a href="{{ url_for('fournisseurs.index') }}" style="color:var(--fg-3);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px;margin-bottom:8px;">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Fournisseurs
    </a>
    <h1>Nouveau fournisseur</h1>
  </div>
</div>

<div style="max-width:640px;">
  <form method="POST" action="{{ url_for('fournisseurs.nouveau') }}">

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Identité</div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Nom <span style="color:var(--color-secondary);">*</span></label>
        <input type="text" name="nom" class="form-input" required placeholder="Ex : Orange Sénégal">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">NINEA</label>
          <input type="text" name="ninea" class="form-input" placeholder="Ex : 001234567">
        </div>
        <div class="form-group">
          <label class="form-label">Catégorie principale</label>
          <select name="categorie" class="form-input">
            <option value="divers">Divers</option>
            <option value="transport">Transport</option>
            <option value="repas">Repas</option>
            <option value="fournitures">Fournitures</option>
            <option value="communication">Communication</option>
            <option value="loyer">Loyer</option>
            <option value="salaires">Salaires</option>
            <option value="hebergement">Hébergement</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Coordonnées</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="tel" name="telephone" class="form-input" placeholder="+221 77 000 00 00">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="contact@fournisseur.com">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Adresse</label>
        <input type="text" name="adresse" class="form-input" placeholder="Rue, Ville">
      </div>
      <div class="form-group">
        <label class="form-label">Site web</label>
        <input type="text" name="site_web" class="form-input" placeholder="www.fournisseur.com">
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-title" style="margin-bottom:20px;">Notes</div>
      <div class="form-group">
        <textarea name="notes" class="form-input" rows="3" style="height:auto;resize:vertical;" placeholder="Conditions de paiement, délais, remarques…"></textarea>
      </div>
    </div>

    <div style="display:flex;gap:12px;">
      <a href="{{ url_for('fournisseurs.index') }}" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-primary" style="flex:1;">
        <i data-lucide="save" style="width:16px;height:16px;"></i> Enregistrer
      </button>
    </div>
  </form>
</div>
{% endblock %}
